<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f1319" />

    <title>Timesheet — Effortless work-hour tracking</title>
    <meta
      name="description"
      content="Check in and out with one tap, watch your day take shape, and export to CSV. A fast, private personal time tracker."
    />

    <!-- Open Graph (Facebook, LinkedIn, Slack, iMessage, …) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Timesheet" />
    <meta property="og:title" content="Timesheet — Effortless work-hour tracking" />
    <meta
      property="og:description"
      content="Check in and out with one tap, watch your day take shape, and export to CSV."
    />
    <meta property="og:url" content="%VITE_SITE_URL%/" />
    <meta property="og:image" content="%VITE_SITE_URL%/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Timesheet Chronograph — a workday shown as a teal day-bar timeline, 7h 45m from 09:00 to 17:45."
    />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Timesheet — Effortless work-hour tracking" />
    <meta
      name="twitter:description"
      content="Check in and out with one tap, watch your day take shape, and export to CSV."
    />
    <meta name="twitter:image" content="%VITE_SITE_URL%/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
